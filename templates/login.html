<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #5a67d8;
        }

        /* 👇 CAMPO SENHA */
        .senha-box {
            position: relative;
            width: 100%;
        }

        .senha-box input {
            padding-right: 40px;
        }

        .senha-box span {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }
    </style>

</head>
<body>

<div class="login-box">
    <h2>🔐 Login</h2>

    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuário" required>

        <div class="senha-box">
            <input type="password" id="senha" name="senha" placeholder="Senha" required>
            <span onclick="toggleSenha()">👁️</span>
        </div>

        <button type="submit">Entrar</button>
    </form>
</div>

<script>
function toggleSenha() {
    var campo = document.getElementById("senha");

    if (campo.type === "password") {
        campo.type = "text";
    } else {
        campo.type = "password";
    }
}
</script>

</body>
</html>
