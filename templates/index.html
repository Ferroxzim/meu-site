<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Usuários</title>

    <style>
        table {
    width: 80%;
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    border-radius: 10px;
    overflow: hidden;
}

th {
    background-color: #4CAF50;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background-color: #f5f5f5;
}

a {
    color: red;
    text-decoration: none;
    font-weight: bold;
}
        body {
            font-family: Arial;
            background-color: #575757;
            text-align: center;
        }

        h1 {
            color: #0f0101;
        }

        form {
            margin: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #0c9611;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #ffffff;
border-left: 5px solid #2be732;
    margin: 10px auto;
    padding: 15px;
    width: 50%;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}form {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 50%;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

li:hover {
    transform: scale(1.03);
        }

        a {
            color: red;
            margin-left: 10px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

<h1>🚀 Cadastro de Usuários</h1>

<form method="POST" action="/add">
    <input type="text" name="nome" placeholder="Nome" required>
    <input type="number" name="idade" placeholder="Idade" required>
    <input type="email" name="email" placeholder="Email" required>
    <button type="submit">Cadastrar</button>
</form>

<h2>👥 Lista de Usuários</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Idade</th>
        <th>Email</th>
        <th>Ação</th>
    </tr>

    {% for user in usuarios %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
        <td>{{ user[2] }}</td>
        <td>{{ user[3] }}</td>
        <td>
            <a href="/delete/{{ user[0] }}">❌</a>
        </td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
